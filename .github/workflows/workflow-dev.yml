name: Build e Push Dev

on:
  push:
    branches: [ "dev" ]

jobs:
  build-dev:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
            cache-from: type=gha
            cache-to: type=gha,mode=max
            context: .
            push: true
            tags: ghcr.io/${{ github.repository_owner }}/backend:dev